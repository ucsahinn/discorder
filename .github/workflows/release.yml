name: Yayın

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Yayınlanacak tag'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Windows x64 yayını
    runs-on: windows-2025
    timeout-minutes: 20
    environment:
      name: release

    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: refs/tags/${{ github.event.inputs.tag || github.ref_name }}
          fetch-depth: 0

      - name: Yayın tag ve sürümünü doğrula
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          $tag = $env:RELEASE_TAG
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Yayın tag'i SemVer formatında olmalı: $tag"
          }

          git fetch --force origin "refs/tags/$tag:refs/tags/$tag"
          $tagCommit = (git rev-list -n 1 $tag).Trim()
          $headCommit = (git rev-parse HEAD).Trim()
          if ($tagCommit -ne $headCommit) {
            throw "Checkout edilen commit tag ile eşleşmiyor. tag=$tagCommit head=$headCommit"
          }

          $tagVersion = $tag.TrimStart('v')
          $versionedProjects = @(
            'src/Discorder.App/Discorder.App.csproj',
            'src/Discorder.Updater/Discorder.Updater.csproj'
          )
          foreach ($projectPath in $versionedProjects) {
            $project = [xml](Get-Content -Raw -LiteralPath $projectPath)
            $projectVersion = $project.Project.PropertyGroup.Version
            if ($projectVersion -ne $tagVersion) {
              throw "Proje sürümü tag ile eşleşmiyor. project=$projectPath version=$projectVersion tag=$tagVersion"
            }
          }

      - name: .NET kur
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2
        with:
          global-json-file: global.json

      - name: Paket üret
        shell: pwsh
        env:
          DISCORDER_CODESIGN_PFX_B64: ${{ secrets.DISCORDER_CODESIGN_PFX_B64 }}
          DISCORDER_CODESIGN_PFX_PASSWORD: ${{ secrets.DISCORDER_CODESIGN_PFX_PASSWORD }}
        run: |
          $signArgs = @()
          $certificatePath = Join-Path $env:RUNNER_TEMP 'discorder-codesign.pfx'

          try {
            if (-not [string]::IsNullOrWhiteSpace($env:DISCORDER_CODESIGN_PFX_B64)) {
              [IO.File]::WriteAllBytes(
                $certificatePath,
                [Convert]::FromBase64String($env:DISCORDER_CODESIGN_PFX_B64))
              $signArgs += @(
                '-CodeSigningCertificatePath',
                $certificatePath
              )
            }
            ./scripts/build-release.ps1 @signArgs
          }
          finally {
            if (Test-Path -LiteralPath $certificatePath) {
              Remove-Item -LiteralPath $certificatePath -Force
            }
          }

      - name: Yayın notu ve SHA-256 hazırla
        id: package
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          $tag = $env:RELEASE_TAG
          $version = $tag.TrimStart('v')
          $archive = Get-ChildItem -LiteralPath artifacts -Filter "Discorder-$version-win-x64.zip" |
            Select-Object -First 1
          if ($null -eq $archive) {
            throw "Yayın arşivi bulunamadı: Discorder-$version-win-x64.zip"
          }

          $shaPath = Join-Path 'artifacts' "Discorder-$version-win-x64.sha256.txt"
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $archive.FullName).Hash
          Set-Content `
            -LiteralPath $shaPath `
            -Value "$hash  $($archive.Name)" `
            -Encoding ASCII
          $stableArchivePath = Join-Path 'artifacts' 'Discorder-win-x64.zip'
          $stableShaPath = Join-Path 'artifacts' 'Discorder-win-x64.sha256.txt'
          Copy-Item -LiteralPath $archive.FullName -Destination $stableArchivePath -Force
          $stableHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $stableArchivePath).Hash
          if ($stableHash -ne $hash) {
            throw "Sabit isimli ZIP kopyasi versioned ZIP ile eslesmiyor."
          }
          Set-Content `
            -LiteralPath $stableShaPath `
            -Value "$hash  Discorder-win-x64.zip" `
            -Encoding ASCII

          $signingStatusPath = Join-Path 'artifacts' 'signing-status.txt'
          $signingStatus = 'unsigned'
          if (Test-Path -LiteralPath $signingStatusPath) {
            $signingStatus = (Get-Content -Raw -LiteralPath $signingStatusPath).Trim()
          }

          if ($signingStatus -eq 'signed') {
            $signingText = 'Kod imzalama: Authenticode imzalı paket.'
          }
          else {
            $signingText = 'Kod imzalama: imzasız paket. Güven sınırı GitHub yayın yetkisi, release yolu, asset digest, SHA-256 dosyası ve manifest doğrulamasıdır.'
          }

          $notesPath = Join-Path 'artifacts' "release-notes-$tag.md"
          $versionedNotesPath = Join-Path 'docs/releases' "$tag.md"
          if (Test-Path -LiteralPath $versionedNotesPath) {
            $notes = Get-Content -Raw -LiteralPath $versionedNotesPath
          }
          else {
            $releaseDate = Get-Date -Format 'yyyy-MM-dd'
            $notes = @"
          # Discorder $tag - Portable Windows Discord bağlantı yöneticisi

          Tarih: $releaseDate

          Discorder $version, Windows'ta Discord bağlantısını sade bir arayüzle yöneten portable masaüstü uygulamasıdır.
          "@
          }

          $releaseAssetSummary = @"

          ## Yayın Asset'leri

          - $($archive.Name)
          - $(Split-Path -Leaf $shaPath)
          - $(Split-Path -Leaf $stableArchivePath)
          - $(Split-Path -Leaf $stableShaPath)
          - SHA-256: $hash
          - $signingText
          "@

          ($notes.TrimEnd() + $releaseAssetSummary) |
            Set-Content -LiteralPath $notesPath -Encoding UTF8

          "archive=$($archive.FullName)" >> $env:GITHUB_OUTPUT
          "sha=$shaPath" >> $env:GITHUB_OUTPUT
          "stable_archive=$stableArchivePath" >> $env:GITHUB_OUTPUT
          "stable_sha=$stableShaPath" >> $env:GITHUB_OUTPUT
          "notes=$notesPath" >> $env:GITHUB_OUTPUT
          "signed=$signingStatus" >> $env:GITHUB_OUTPUT

      - name: GitHub Release yayınla
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_ARCHIVE: ${{ steps.package.outputs.archive }}
          RELEASE_SHA: ${{ steps.package.outputs.sha }}
          RELEASE_STABLE_ARCHIVE: ${{ steps.package.outputs.stable_archive }}
          RELEASE_STABLE_SHA: ${{ steps.package.outputs.stable_sha }}
          RELEASE_NOTES: ${{ steps.package.outputs.notes }}
        run: |
          $tag = $env:RELEASE_TAG
          $repo = $env:RELEASE_REPOSITORY
          $releaseTitle = "Discorder $tag - Portable Windows Discord bağlantı yöneticisi"
          if (Test-Path -LiteralPath $env:RELEASE_NOTES) {
            $firstHeading = Get-Content -LiteralPath $env:RELEASE_NOTES |
              Where-Object { $_ -match '^#\s+' } |
              Select-Object -First 1
            if (-not [string]::IsNullOrWhiteSpace($firstHeading)) {
              $releaseTitle = $firstHeading -replace '^#\s+', ''
            }
          }

          function Get-AssetByName($assets, [string] $name) {
            $matches = @($assets | Where-Object { $_.name -eq $name })
            if ($matches.Count -gt 1) {
              throw "Release $tag içinde $name için birden fazla asset var."
            }

            if ($matches.Count -eq 0) {
              return $null
            }

            return $matches[0]
          }

          function Assert-ReleaseTargetIfPinned($release) {
            $targetCommitish = [string] $release.targetCommitish
            if ($targetCommitish -match '^[a-fA-F0-9]{40}$') {
              $headCommit = (git rev-parse HEAD).Trim()
              if ($targetCommitish.ToLowerInvariant() -ne $headCommit.ToLowerInvariant()) {
                throw "Release $tag farkli commit'e bagli. release=$targetCommitish head=$headCommit"
              }
            }
          }

          function Invoke-Gh {
            & gh @args
            if ($LASTEXITCODE -ne 0) {
              throw "gh komutu basarisiz oldu."
            }
          }

          function Get-ReleaseMetadata {
            $json = & gh release view $tag --repo $repo --json assets,isDraft,isPrerelease,targetCommitish
            if ($LASTEXITCODE -ne 0) {
              throw "Release $tag okunamadi."
            }

            return $json | ConvertFrom-Json
          }

          function Assert-UploadedAsset($asset, [string] $name) {
            if ($null -eq $asset) {
              throw "Release $tag eksik asset iceriyor: $name"
            }

            if ([string]::IsNullOrWhiteSpace($asset.state) -or
                $asset.state -ne 'uploaded') {
              throw "Release $tag asset uploaded durumda degil: $name state=$($asset.state)"
            }

            if ([string]::IsNullOrWhiteSpace($asset.digest)) {
              throw "Release $tag asset digest bilgisi icermiyor: $name"
            }
          }

          function Assert-ReleaseAssetPair(
            $release,
            [string] $archiveAssetName,
            [string] $shaAssetName,
            [string] $assetCheckDir)
          {
            $archiveAsset = Get-AssetByName $release.assets $archiveAssetName
            $shaAsset = Get-AssetByName $release.assets $shaAssetName
            Assert-UploadedAsset $archiveAsset $archiveAssetName
            Assert-UploadedAsset $shaAsset $shaAssetName

            Invoke-Gh release download $tag `
              --repo $repo `
              --pattern $shaAssetName `
              --dir $assetCheckDir `
              --clobber

            $downloadedShaPath = Join-Path $assetCheckDir $shaAssetName
            $shaAssetHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $downloadedShaPath).Hash.ToLowerInvariant()
            if ($shaAsset.digest.ToLowerInvariant() -ne "sha256:$shaAssetHash") {
              throw "Release $tag SHA asset digest'i indirilen dosyayla eslesmiyor: $shaAssetName"
            }

            $declaredArchiveHash = ((Get-Content -Raw -LiteralPath $downloadedShaPath) -split '\s+')[0].ToLowerInvariant()
            if ($declaredArchiveHash -notmatch '^[a-f0-9]{64}$') {
              throw "Release $tag SHA dosyasi gecerli SHA-256 icermiyor: $shaAssetName"
            }

            if ($archiveAsset.digest.ToLowerInvariant() -ne "sha256:$declaredArchiveHash") {
              throw "Release $tag ZIP asset digest'i SHA dosyasiyla eslesmiyor: $archiveAssetName"
            }

            return $declaredArchiveHash
          }

          function Assert-ReleaseAssetsReady(
            [string] $archiveName,
            [string] $shaName,
            [string] $stableArchiveName,
            [string] $stableShaName,
            [string] $localArchivePath,
            [string] $localStableArchivePath)
          {
            $release = Get-ReleaseMetadata
            Assert-ReleaseTargetIfPinned $release

            if ($release.isDraft -or $release.isPrerelease) {
              throw "Release $tag draft veya prerelease durumda; latest yapilmiyor."
            }

            $assetCheckDir = Join-Path $env:RUNNER_TEMP "discorder-release-asset-check-$tag"
            if (Test-Path -LiteralPath $assetCheckDir) {
              Remove-Item -LiteralPath $assetCheckDir -Recurse -Force
            }
            New-Item -ItemType Directory -Path $assetCheckDir | Out-Null

            $versionedHash = Assert-ReleaseAssetPair $release $archiveName $shaName $assetCheckDir
            $stableHash = Assert-ReleaseAssetPair $release $stableArchiveName $stableShaName $assetCheckDir
            $localHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $localArchivePath).Hash.ToLowerInvariant()
            $localStableHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $localStableArchivePath).Hash.ToLowerInvariant()

            if ($versionedHash -ne $stableHash) {
              throw "Versioned ve sabit isimli release ZIP hash'leri eslesmiyor."
            }

            if ($versionedHash -ne $localHash -or $stableHash -ne $localStableHash) {
              throw "Release ZIP hash'i bu workflow'da uretilen paketle eslesmiyor."
            }
          }

          $archiveName = [IO.Path]::GetFileName($env:RELEASE_ARCHIVE)
          $shaName = [IO.Path]::GetFileName($env:RELEASE_SHA)
          $stableArchiveName = [IO.Path]::GetFileName($env:RELEASE_STABLE_ARCHIVE)
          $stableShaName = [IO.Path]::GetFileName($env:RELEASE_STABLE_SHA)

          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -eq 0) {
            $release = gh release view $tag --repo $repo --json assets,isDraft,isPrerelease,targetCommitish |
              ConvertFrom-Json
            $archiveAsset = Get-AssetByName $release.assets $archiveName
            $shaAsset = Get-AssetByName $release.assets $shaName
            $stableArchiveAsset = Get-AssetByName $release.assets $stableArchiveName
            $stableShaAsset = Get-AssetByName $release.assets $stableShaName

            if ($release.isDraft -or $release.isPrerelease) {
              throw "Release $tag draft veya prerelease durumda; otomatik latest yayına çevrilmiyor."
            }

            Assert-ReleaseTargetIfPinned $release

            if ($archiveAsset -or $shaAsset -or $stableArchiveAsset -or $stableShaAsset) {
              if (-not ($archiveAsset -and $shaAsset)) {
                throw "Release $tag eksik asset içeriyor. Güvenli yayın için manuel kontrol gerekiyor."
              }

              if ([string]::IsNullOrWhiteSpace($archiveAsset.digest) -or
                  [string]::IsNullOrWhiteSpace($shaAsset.digest)) {
                throw "Release $tag asset digest bilgisi içermiyor. Güvenli yayın doğrulanamadı."
              }

              $assetCheckDir = Join-Path $env:RUNNER_TEMP "discorder-release-asset-check-$tag"
              if (Test-Path -LiteralPath $assetCheckDir) {
                Remove-Item -LiteralPath $assetCheckDir -Recurse -Force
              }
              New-Item -ItemType Directory -Path $assetCheckDir | Out-Null
              gh release download $tag `
                --repo $repo `
                --pattern $shaName `
                --dir $assetCheckDir `
                --clobber

              $downloadedShaPath = Join-Path $assetCheckDir $shaName
              $shaAssetHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $downloadedShaPath).Hash.ToLowerInvariant()
              if ($shaAsset.digest.ToLowerInvariant() -ne "sha256:$shaAssetHash") {
                throw "Release $tag SHA asset digest'i indirilen dosyayla eşleşmiyor."
              }

              $declaredArchiveHash = ((Get-Content -Raw -LiteralPath $downloadedShaPath) -split '\s+')[0].ToLowerInvariant()
              if ($declaredArchiveHash -notmatch '^[a-f0-9]{64}$') {
                throw "Release $tag SHA dosyası geçerli SHA-256 içermiyor."
              }

              if ($archiveAsset.digest.ToLowerInvariant() -ne "sha256:$declaredArchiveHash") {
                throw "Release $tag ZIP asset digest'i SHA dosyasıyla eşleşmiyor."
              }

              if ($stableArchiveAsset -or $stableShaAsset) {
                if (-not ($stableArchiveAsset -and $stableShaAsset)) {
                  throw "Release $tag eksik sabit isimli asset ciftini iceriyor. Guvenli yayin icin manuel kontrol gerekiyor."
                }

                if ([string]::IsNullOrWhiteSpace($stableArchiveAsset.digest) -or
                    [string]::IsNullOrWhiteSpace($stableShaAsset.digest)) {
                  throw "Release $tag sabit isimli asset digest bilgisi icermiyor."
                }

                gh release download $tag `
                  --repo $repo `
                  --pattern $stableShaName `
                  --dir $assetCheckDir `
                  --clobber

                $downloadedStableShaPath = Join-Path $assetCheckDir $stableShaName
                $stableShaAssetHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $downloadedStableShaPath).Hash.ToLowerInvariant()
                if ($stableShaAsset.digest.ToLowerInvariant() -ne "sha256:$stableShaAssetHash") {
                  throw "Release $tag sabit SHA asset digest'i indirilen dosyayla eslesmiyor."
                }

                $declaredStableArchiveHash = ((Get-Content -Raw -LiteralPath $downloadedStableShaPath) -split '\s+')[0].ToLowerInvariant()
                if ($declaredStableArchiveHash -notmatch '^[a-f0-9]{64}$') {
                  throw "Release $tag sabit SHA dosyasi gecerli SHA-256 icermiyor."
                }

                if ($stableArchiveAsset.digest.ToLowerInvariant() -ne "sha256:$declaredStableArchiveHash") {
                  throw "Release $tag sabit ZIP asset digest'i SHA dosyasiyla eslesmiyor."
                }
              }
              else {
                gh release upload $tag `
                  $env:RELEASE_STABLE_ARCHIVE `
                  $env:RELEASE_STABLE_SHA `
                  --repo $repo
                if ($LASTEXITCODE -ne 0) {
                  throw "Release $tag sabit isimli asset yukleme islemi basarisiz oldu."
                }
              }

              Assert-ReleaseAssetsReady `
                $archiveName `
                $shaName `
                $stableArchiveName `
                $stableShaName `
                $env:RELEASE_ARCHIVE `
                $env:RELEASE_STABLE_ARCHIVE

              Invoke-Gh release edit $tag `
                --repo $repo `
                --title $releaseTitle `
                --notes-file $env:RELEASE_NOTES `
                --latest
              Write-Host "Release $tag zaten doğrulanmış asset'leri içeriyor; metadata güncellendi."
              return
            }

            gh release upload $tag `
              $env:RELEASE_ARCHIVE `
              $env:RELEASE_SHA `
              $env:RELEASE_STABLE_ARCHIVE `
              $env:RELEASE_STABLE_SHA `
              --repo $repo
            if ($LASTEXITCODE -ne 0) {
              throw "Release $tag asset yukleme islemi basarisiz oldu."
            }
            Assert-ReleaseAssetsReady `
              $archiveName `
              $shaName `
              $stableArchiveName `
              $stableShaName `
              $env:RELEASE_ARCHIVE `
              $env:RELEASE_STABLE_ARCHIVE
            Invoke-Gh release edit $tag `
              --repo $repo `
              --title $releaseTitle `
              --notes-file $env:RELEASE_NOTES `
              --latest
          }
          else {
            gh release create $tag `
              $env:RELEASE_ARCHIVE `
              $env:RELEASE_SHA `
              $env:RELEASE_STABLE_ARCHIVE `
              $env:RELEASE_STABLE_SHA `
              --repo $repo `
              --title $releaseTitle `
              --notes-file $env:RELEASE_NOTES
            if ($LASTEXITCODE -ne 0) {
              throw "Release $tag olusturulamadi."
            }
            Assert-ReleaseAssetsReady `
              $archiveName `
              $shaName `
              $stableArchiveName `
              $stableShaName `
              $env:RELEASE_ARCHIVE `
              $env:RELEASE_STABLE_ARCHIVE
            Invoke-Gh release edit $tag `
              --repo $repo `
              --title $releaseTitle `
              --notes-file $env:RELEASE_NOTES `
              --latest
          }
