name: Yayın

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Yayınlanacak tag'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Windows x64 yayını
    runs-on: windows-2025
    timeout-minutes: 20

    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: .NET kur
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Paket üret
        shell: pwsh
        env:
          DISCORDER_CODESIGN_PFX_B64: ${{ secrets.DISCORDER_CODESIGN_PFX_B64 }}
          DISCORDER_CODESIGN_PFX_PASSWORD: ${{ secrets.DISCORDER_CODESIGN_PFX_PASSWORD }}
        run: |
          $signArgs = @()
          if (-not [string]::IsNullOrWhiteSpace($env:DISCORDER_CODESIGN_PFX_B64)) {
            $certificatePath = Join-Path $env:RUNNER_TEMP 'discorder-codesign.pfx'
            [IO.File]::WriteAllBytes(
              $certificatePath,
              [Convert]::FromBase64String($env:DISCORDER_CODESIGN_PFX_B64))
            $signArgs += @(
              '-CodeSigningCertificatePath',
              $certificatePath,
              '-RequireCodeSigning'
            )

            if (-not [string]::IsNullOrWhiteSpace($env:DISCORDER_CODESIGN_PFX_PASSWORD)) {
              $signArgs += @(
                '-CodeSigningCertificatePassword',
                $env:DISCORDER_CODESIGN_PFX_PASSWORD
              )
            }
          }

          ./scripts/build-release.ps1 @signArgs

      - name: Yayın notu ve SHA-256 hazırla
        id: package
        shell: pwsh
        run: |
          $tag = '${{ github.event.inputs.tag || github.ref_name }}'
          $version = $tag.TrimStart('v')
          $archive = Get-ChildItem -LiteralPath artifacts -Filter "Discorder-$version-win-x64.zip" |
            Select-Object -First 1
          if ($null -eq $archive) {
            throw "Yayın arşivi bulunamadı: Discorder-$version-win-x64.zip"
          }

          $shaPath = Join-Path 'artifacts' "Discorder-$version-win-x64.sha256.txt"
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $archive.FullName).Hash
          Set-Content `
            -LiteralPath $shaPath `
            -Value "$hash  $($archive.Name)" `
            -Encoding ASCII

          $signingStatusPath = Join-Path 'artifacts' 'signing-status.txt'
          $signingStatus = 'unsigned'
          if (Test-Path -LiteralPath $signingStatusPath) {
            $signingStatus = (Get-Content -Raw -LiteralPath $signingStatusPath).Trim()
          }

          if ($signingStatus -eq 'signed') {
            $signingText = 'Kod imzalama: Authenticode imzalı paket.'
          }
          else {
            $signingText = 'Kod imzalama: imzasız paket. Windows SmartScreen Unknown publisher uyarısı gösterebilir.'
          }

          $notesPath = Join-Path 'artifacts' "release-notes-$tag.md"
          $notes = @"
          # Discorder $version

          Discorder $version web kapsamı, tanılama paketi ve premium arayüz bugfix yayınıdır.

          ## Öne çıkanlar

          - Arayüz 1320x780 sabit premium sahneye alındı; arka plan videosu kullanıcı ayarı olmadan sürekli görünür.
          - Arka plan videosu release zip içine `Assets/background.mp4` olarak eklenir; uygulama önce yerel videoyu oynatır, yalnızca gerekirse uzak kaynağa düşer.
          - Windows hosts kilidi PowerShell `Set-Content` yerine doğrulanmış .NET dosya yazımıyla güncellenir; bazı Windows 10 makinelerde görülen hosts yazım hatası giderildi.
          - WireSock/GitHub indirme timeout hataları kullanıcıya Türkçe ve eyleme dönük mesajla gösterilir.
          - Güç halkası panel içinde optik olarak yeniden ölçülendirildi; parlak fosfor görünür kalırken üst-alt kesilme hissi giderildi.
          - Sağ alt kaynak bağlantısı metin yerine ikonlu GitHub butonuna çevrildi.
          - Kapalı durum kırmızı fosfor, bağlı durum yeşil fosfor olacak şekilde bağlantı butonu, rozet ve süreç çubuğu netleştirildi.
          - Web modu sözleşmesi netleştirildi: kapalıyken yalnızca Discord uygulaması tünellenir; açıkken Discord uygulaması ve desteklenen tarayıcılar birlikte tünellenir.
          - Web modu kapalı bağlı oturumlarda desteklenen tarayıcıların Discord'a düz internetten çıkmasını azaltan geçici `Discorder.TunnelScope.Browsers` Windows Firewall kapsamı eklendi.
          - Bağlan, bağlantıyı kes ve üst üste aç/kapat geçişlerinde geçici kapsam kuralları temizlenip yeniden uygulanır.
          - Tanılama paketi aktif log dosyaları yazılırken de staging kopyası üzerinden zip üretir; paket hazır olunca doğrudan tanılama paketi klasörü açılır.
          - GitHub/DNS indirme hataları kullanıcıya Türkçe ve eyleme dönük metinle gösterilir; ayrıntılı stack trace tanılama loglarında kalır.
          - İşletim Merkezi paneli: arka planda çalışma, Windows başlangıcı ve tanılama durumu tek yerden görülür.
          - Pencere kapansa bile isteğe bağlı bildirim alanında çalışmaya devam etme desteği eklendi.
          - Windows oturumu açılınca Discorder'ı otomatik başlatma ayarı eklendi.
          - Onar akışı ayarları, WireSock kurulumunu ve tanılama loglarını koruyarak profil, wgcf ve kurucu önbelleğini yeniler.
          - Temiz kaldırma akışı Discorder kilidini, başlangıç kaydını, yerel veriyi, marker izini ve Discorder'ın kurduğu WireSock VPN Client kurulumunu geri alır.
          - Release paketi adı proje sürümünden otomatik üretilir.

          ## İndirme

          - $($archive.Name) dosyasını indirin.
          - Zip'i çıkarın ve Discorder.exe dosyasını çalıştırın.
          - SHA-256: $hash
          - $signingText

          ## Doğrulama

          - scripts/build-release.ps1 geçti.
          - Core ve Windows render testleri geçti.
          - Release arşivi self-contained Windows x64 olarak üretildi.
          "@
          $notes | Set-Content -LiteralPath $notesPath -Encoding UTF8

          "archive=$($archive.FullName)" >> $env:GITHUB_OUTPUT
          "sha=$shaPath" >> $env:GITHUB_OUTPUT
          "notes=$notesPath" >> $env:GITHUB_OUTPUT
          "signed=$signingStatus" >> $env:GITHUB_OUTPUT

      - name: GitHub Release yayınla
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ github.event.inputs.tag || github.ref_name }}'
          $version = $tag.TrimStart('v')
          $repo = '${{ github.repository }}'
          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag `
              '${{ steps.package.outputs.archive }}' `
              '${{ steps.package.outputs.sha }}' `
              --repo $repo `
              --clobber
            gh release edit $tag `
              --repo $repo `
              --title "Discorder $version" `
              --notes-file '${{ steps.package.outputs.notes }}' `
              --latest
          }
          else {
            gh release create $tag `
              '${{ steps.package.outputs.archive }}' `
              '${{ steps.package.outputs.sha }}' `
              --repo $repo `
              --title "Discorder $version" `
              --notes-file '${{ steps.package.outputs.notes }}' `
              --latest
          }
